; ═══════════════════════════════════════════════════════════════════
;  AgriBot Camera Node – PlatformIO Configuration
;  Board:     AI Thinker ESP32-CAM (esp32cam)
;  Transport: HTTP MJPEG stream (standalone, no micro-ROS)
;  Purpose:   Live camera feed for the AgriBot dashboard
; ═══════════════════════════════════════════════════════════════════

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

; ── Board-specific settings ──────────────────────────────────────
; AI Thinker ESP32-CAM has 4 MB flash + 4 MB PSRAM
board_build.partitions = huge_app.csv
board_build.flash_mode = qio

; ── Build flags ──────────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -I../
