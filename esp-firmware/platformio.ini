; =============================================================================
; AgriBot ESP32 Firmware – PlatformIO Configuration
; Target  : ESP32 WROOM (esp32dev)
; Framework: Arduino (required by micro_ros_arduino)
; =============================================================================

[env:esp32dev]
platform  = espressif32@6.9.0
board     = esp32dev
framework = arduino

; --- Serial monitor ---
monitor_speed = 115200

; --- Build flags ---
build_flags =
    -D BOARD_HAS_PSRAM=0
    ; micro-ROS transport over Wi-Fi (UDP)
    -D MICRO_ROS_TRANSPORT_ARDUINO_WIFI

; --- Library dependencies ---
lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino.git#humble
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; --- Upload / OTA ---
upload_speed = 921600
